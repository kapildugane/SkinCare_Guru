<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skincare Guru - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-sparkles logo-icon"></i>
                <h2>Guru Admin</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Overview</span>
                </a>
                <a href="/" class="nav-item">
                    <i class="fa-solid fa-robot"></i>
                    <span>Open Chatbot</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h1>Project Overview</h1>
                <div class="user-profile">
                    <span>Admin</span>
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- KPI Cards -->
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-icon"><i class="fa-solid fa-users"></i></div>
                        <div class="kpi-info">
                            <h3>Total Chatbot Users</h3>
                            <p id="kpi-users">0</p>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon"><i class="fa-solid fa-clipboard-check"></i></div>
                        <div class="kpi-info">
                            <h3>Completed Consultations</h3>
                            <p id="kpi-consultations">0</p>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon"><i class="fa-solid fa-list-ol"></i></div>
                        <div class="kpi-info">
                            <h3>Avg Routine Length</h3>
                            <p id="kpi-routine-length">0.0</p>
                        </div>
                    </div>
                    <div class="kpi-card">
                        <div class="kpi-icon"><i class="fa-solid fa-box-open"></i></div>
                        <div class="kpi-info">
                            <h3>Products Recommended</h3>
                            <p id="kpi-products">0</p>
                        </div>
                    </div>
                </div>

                <!-- Charts Area -->
                <div class="charts-grid">
                    <!-- Line Chart -->
                    <div class="chart-card line-chart-card">
                        <div class="chart-header">
                            <h3>Chatbot Sessions Over Time</h3>
                        </div>
                        <div class="chart-body">
                            <canvas id="sessionsChart"></canvas>
                        </div>
                    </div>

                    <!-- Pie Chart -->
                    <div class="chart-card pie-chart-card">
                        <div class="chart-header">
                            <h3>Entry Card Distribution</h3>
                        </div>
                        <div class="chart-body">
                            <canvas id="entryChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="admin.js"></script>
</body>
</html>
